    <h1>プライバシーポリシー（モバログ）</h1>
    <p>「モバログ」は、ユーザーのプライバシーを尊重し、個人情報の保護に努めます。</p>
    <h3>1. 取得する情報および利用目的</h3>
    <p>Googleアカウント情報（メールアドレス）および交信ログデータを、Googleドライブへのバックアップおよび同期機能のために使用します。</p>
    <h3>2. データの保存と管理</h3>
    <p>データはユーザー自身のGoogleドライブ内の「モバログ」フォルダに保存され、開発者がアクセスすることはありません。</p>
    <h3>3. 第三者への提供</h3>
    <p>法令に基づく場合を除き、同意なく第三者に提供することはありません。</p>
